<div class="comment-post fixed-bottom bg-light">
    <form action="/post_comment/{{post.post_id}}/" method="post" id="comment">
         {% csrf_token %}
            <textarea name="comment"  rows="1" class="w-100 mr-2 p-3" placeholder="Write a comment" 
            style="resize: none; overflow: hidden; background-color: rgb(128, 128, 128, .2); border-radius: 20px;" id="msg" required></textarea>
            <input type="hidden" name="post_id" value="{{post.post_id}}">
            <input type="hidden", name="profile", value="{{request.user.username}}">
            <button type="submit" class="p-3"><i class="fa fa-paper-plane text-primary" style="font-size: 25px;"></i></button>
    </form>
</div>
