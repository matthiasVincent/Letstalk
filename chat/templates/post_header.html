<div class="hd d-flex justify-content-between mb-2 p-2" >
    <a href="{% url 'profile' post.poster.username %}" class="text-decoration-none text-dark">
        <div class="lf" style="padding-left: 25px;">
            <div class="img-cont" style="margin-left: 25px;">
                <img src="{{post.poster.profile_image.url}}" alt="hi" style="width: 100%; height: 100%; border-radius: 50%;">
            </div>
            <div class="ml-4 d-flex flex-column">
                <span>{{post.poster.fullname|truncatechars:11}}</span>
                <span class="ml-2">{% if post.poster.followers > 0 %}{{post.poster.followers}} follower{{post.poster.followers|pluralize}} {% endif %}</span>
            </div>
        </div>
    </a>
    <p>
        <a href="#" class="text-decoration-none" style="font-size: 20px; font-weight: 600; margin-right: 20px;">
            <i class="fa fa-ellipsis-h text-dark"></i>
        </a>
    </p>
</div>
